################################################################################
# 文件：application.yml （pandora-service-user 主配置）
#
# 【名字】 pandora-service-user application.yml
# 【用途】 用户领域微服务（用户档案、角色、权限、菜单）的基础配置
# 【用法】 Spring Boot 启动时自动加载；必须指定 profile
# 【配置方法】 所有外部依赖都可通过 env / -D / Nacos 覆写
# 配套 Nacos 远程 DataId：pandora-service-user-{profile}.yml
################################################################################

server:
  # 业务端口（网关按 lb://pandora-service-user 路由到此）
  port: 8081

management:
  server:
    # 运维端口
    port: 18082

spring:
  application:
    # Nacos 服务名 & Nacos 远程 DataId 前缀
    name: pandora-service-user
  profiles:
    active: @spring.profiles.active@

  # ==================================================================
  # 控制台 ANSI 彩色日志（与 Spring Boot 原生启动样式一致）
  # ALWAYS: 强制启用（Windows PowerShell / Windows Terminal / IDEA 控制台均支持）
  # DETECT: 自动检测（部分终端会识别失败退化为无色）
  # NEVER : 关闭（用于纯文件输出场景）
  # ==================================================================
  output:
    ansi:
      enabled: ALWAYS

  cloud:
    # ================================================================
    # Nacos 集群
    #   集群节点：192.168.50.168:8140,8550,8960
    # ================================================================
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:192.168.50.168:8140,192.168.50.168:8550,192.168.50.168:8960}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      namespace: ${NACOS_NAMESPACE:}
      discovery:
        enabled: true
        group: ${spring.profiles.active}
        namespace: ${spring.cloud.nacos.namespace}
        metadata:
          version: 1.0.0
          region: ${REGION:default}
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
      config:
        enabled: true
        group: ${spring.profiles.active}
        file-extension: yml
        namespace: ${spring.cloud.nacos.namespace}
        refresh-enabled: true
