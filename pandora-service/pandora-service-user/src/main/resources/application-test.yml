################################################################################
# 文件：application-test.yml （pandora-service-user 测试环境）
#
# 【名字】 pandora-service-user test profile
# 【用途】 QA 验证环境；同开发结构但 DB=pandora_test、Redis=2号库
################################################################################

spring:
  config:
    activate:
      on-profile: test
    import:
      - optional:nacos:pandora-service-user-test.yml?group=${NACOS_REMOTE_GROUP:TEST_GROUP}&refreshEnabled=true

  servlet:
    context-path: /

  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: 8719
      datasource:
        flow:
          nacos:
            server-addr: ${spring.cloud.nacos.server-addr}
            dataId: ${spring.application.name}-test-flow-rules
            groupId: SENTINEL_GROUP
            rule-type: flow
        degrade:
          nacos:
            server-addr: ${spring.cloud.nacos.server-addr}
            dataId: ${spring.application.name}-test-degrade-rules
            groupId: SENTINEL_GROUP
            rule-type: degrade

  # 动态多数据源：同开发结构，仅 schema 换成 pandora_test
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: ${MYSQL_URL:jdbc:mysql://localhost:3306/pandora_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_PASSWORD:123456}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave:
          url: ${MYSQL_URL:jdbc:mysql://localhost:3306/pandora_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_PASSWORD:123456}
          driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        minimum-idle: 5
        maximum-pool-size: 20
        idle-timeout: 600000
        max-lifetime: 1800000
        connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:2}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
          database: ${REDIS_DATABASE:2}
          connectionPoolSize: 16
          connectionMinimumIdleSize: 4
          idleConnectionTimeout: 10000
          timeout: 3000
          retryAttempts: 3

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_SERVER_URL:http://localhost:9100}

server:
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
      profile: test

minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:corp-web}

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
  global-config:
    print-banner: false
    normal-value-of-logic-delete: 0
    deleted-value-of-logic-delete: 1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    cn.pandora: INFO
    com.mybatisflex: INFO
    org.springframework.web: INFO
  # 不自定义 pattern.console，使用 Spring Boot 默认带 %clr(...) 的彩色 pattern；
  # 由 application.yml 的 spring.output.ansi.enabled=ALWAYS 开启颜色。
